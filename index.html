<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Variedades Aura Boutique - Tu tienda de confianza para calzado, ropa y lociones de calidad. Moda y estilo para toda ocasión en Colombia." />
    <meta name="keywords" content="variedades, aura, boutique, calzado, ropa, lociones, moda, Colombia, tienda online" />
    <meta name="author" content="Variedades Aura" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://variedadesaura.com/" />
    <meta property="og:title" content="Variedades Aura Boutique - Calzado, Ropa y Lociones" />
    <meta property="og:description" content="Tu tienda de confianza para calzado, ropa y lociones de calidad. Moda y estilo para toda ocasión." />
    <meta property="og:image" content="/logo.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://variedadesaura.com/" />
    <meta property="twitter:title" content="Variedades Aura Boutique" />
    <meta property="twitter:description" content="Tu tienda de confianza para calzado, ropa y lociones de calidad." />
    <meta property="twitter:image" content="/logo.png" />
    
    <!-- Preconexión a CDNs -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    
    <!-- Precarga de fuentes -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" as="style" />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" as="style" />
    
    <title>Variedades Aura Boutique | Calzado, Ropa y Lociones</title>
    
    <!-- Estilos inline críticos para evitar FOUC -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #f5f3ff 0%, #fdf2f8 50%, #f0fdf4 100%);
        min-height: 100vh;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      /* Loader inicial */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      .initial-loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      
      .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Loader inicial -->
    <div id="initial-loader" class="initial-loader">
      <div class="loader-spinner"></div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Ocultar loader cuando la página esté lista
      window.addEventListener('load', function() {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(() => {
            loader.classList.add('hide');
            setTimeout(() => {
              loader.style.display = 'none';
            }, 500);
          }, 500);
        }
      });
      
      // Registrar Service Worker para PWA (opcional)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // navigator.serviceWorker.register('/sw.js').catch(console.log);
        });
      }
    </script>
  </body>
</html>
